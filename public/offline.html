<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>SiteTracker Pro Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7fb;
        color: #111827;
      }
      main {
        max-width: 420px;
        border-radius: 28px;
        background: #fff;
        padding: 24px;
        box-shadow: 0 22px 50px rgba(17, 24, 39, 0.14);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #667085;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Open the installed app again. Saved screens and local entries remain available, and pending entries sync when internet returns.</p>
    </main>
  </body>
</html>
