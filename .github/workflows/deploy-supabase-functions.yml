name: Deploy Supabase Functions

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy AI functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID repository secrets before running this workflow."
            exit 1
          fi
          supabase functions deploy ai-assistant --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy voice-parser --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy bill-vision-ocr --project-ref "$SUPABASE_PROJECT_ID"
